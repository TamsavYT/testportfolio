<!doctype html>

  <!-- FONTS preloaded from same domain — zero cross-origin round trips -->
  <link rel="preload" href="/fonts/playfair-700.woff2" as="font" type="font/woff2" crossorigin />

  <!--
    ANTI-FLASH THEME SCRIPT — Must run before any rendering.
    Reads localStorage and sets data-theme on <html> immediately,
    so the correct theme is applied before React mounts.
    NO flash of wrong theme on reload.
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
